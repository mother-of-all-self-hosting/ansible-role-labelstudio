---
# Project source code URL: https://github.com/HumanSignal/label-studio

labelstudio_enabled: true

labelstudio_identifier: labelstudio
labelstudio_base_path: "/{{ labelstudio_identifier }}"
labelstudio_data_path: "{{ labelstudio_base_path }}/data"

# renovate: datasource=docker depName=heartexlabs/label-studio versioning=semver
labelstudio_version: 1.23.0

labelstudio_uid: ''
labelstudio_gid: ''

# The scheme used for serving Label Studio.
labelstudio_scheme: https

# The hostname at which Label Studio is served.
labelstudio_hostname: ''

# The path at which Label Studio is served.
# This value must either be `/` or not end with a slash (e.g. `/labelstudio`).
labelstudio_path_prefix: /

labelstudio_container_image: "{{ labelstudio_container_image_registry_prefix }}heartexlabs/label-studio:{{ labelstudio_container_image_tag }}"
labelstudio_container_image_tag: "{{ labelstudio_version }}"
labelstudio_container_image_registry_prefix: "{{ labelstudio_container_image_registry_prefix_upstream }}"
labelstudio_container_image_registry_prefix_upstream: "{{ labelstudio_container_image_registry_prefix_upstream_default }}"
labelstudio_container_image_registry_prefix_upstream_default: docker.io/
labelstudio_container_image_force_pull: "{{ labelstudio_container_image.endswith(':latest') }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
labelstudio_container_network: "{{ labelstudio_identifier }}"

# Specifies how the container publishes its HTTP port
#
# Takes an "<ip>:<port>" value (e.g. "127.0.0.1:4533"), just a port number or an empty string to not expose.
labelstudio_container_http_bind_port: ''

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
labelstudio_container_additional_networks: "{{ labelstudio_container_additional_networks_auto + labelstudio_container_additional_networks_custom }}"
labelstudio_container_additional_networks_auto: []
labelstudio_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
#
# See the `--mount` documentation for the `docker run` command.
#
# Example:
# labelstudio_container_additional_volumes:
#   - type: bind
#     src: /path/on/the/host
#     dst: /data
#   - type: bind
#     src: /another-path/on/the/host
#     dst: /read-only
#     options: readonly
labelstudio_container_additional_volumes: []

# labelstudio_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `labelstudio_container_labels_additional_labels`.
labelstudio_container_labels_traefik_enabled: true
labelstudio_container_labels_traefik_docker_network: "{{ labelstudio_container_network }}"
labelstudio_container_labels_traefik_hostname: "{{ labelstudio_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/labelstudio`).
labelstudio_container_labels_traefik_path_prefix: "{{ labelstudio_path_prefix }}"
labelstudio_container_labels_traefik_rule: "Host(`{{ labelstudio_container_labels_traefik_hostname }}`){% if labelstudio_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ labelstudio_container_labels_traefik_path_prefix }}`){% endif %}"
labelstudio_container_labels_traefik_priority: 0
labelstudio_container_labels_traefik_entrypoints: web-secure
labelstudio_container_labels_traefik_tls: "{{ labelstudio_container_labels_traefik_entrypoints != 'web' }}"
labelstudio_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls whether a compression middleware will be injected into the middlewares list.
# This compression middleware is supposed to be defined elsewhere (using labels or a File provider, etc.) and is merely referenced by this router.
labelstudio_container_labels_traefik_compression_middleware_enabled: false
labelstudio_container_labels_traefik_compression_middleware_name: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `labelstudio_container_labels_traefik_additional_response_headers_custom`
labelstudio_container_labels_traefik_additional_request_headers: "{{ labelstudio_container_labels_traefik_additional_request_headers_auto | combine(labelstudio_container_labels_traefik_additional_request_headers_custom) }}"
labelstudio_container_labels_traefik_additional_request_headers_auto: {}
labelstudio_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `labelstudio_container_labels_traefik_additional_response_headers_custom`
labelstudio_container_labels_traefik_additional_response_headers: "{{ labelstudio_container_labels_traefik_additional_response_headers_auto | combine(labelstudio_container_labels_traefik_additional_response_headers_custom) }}"
labelstudio_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': labelstudio_http_header_xss_protection} if labelstudio_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': labelstudio_http_header_content_type_options} if labelstudio_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': labelstudio_http_header_content_security_policy} if labelstudio_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': labelstudio_http_header_permissions_policy} if labelstudio_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': labelstudio_http_header_strict_transport_security} if labelstudio_http_header_strict_transport_security and labelstudio_container_labels_traefik_tls else {})
  }}
labelstudio_container_labels_traefik_additional_response_headers_custom: {}

# labelstudio_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# labelstudio_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
labelstudio_container_labels_additional_labels: ''

# Specifies how often the container health-check will run.
#
# For Traefik based setups, it's important that the interval is short,
# because the interval value also specifies the "initial wait time".
# This is a Docker (moby) bug: https://github.com/moby/moby/issues/33410
# Without a successful healthcheck, Traefik will not register the service for reverse-proxying.
# Thus, the health interval determines the initial start-up time -- the smaller, the better.
#
# For non-Traefik setups, we use the default healthcheck interval (30s) to decrease overhead.
labelstudio_container_health_interval: "{{ '5s' if labelstudio_container_labels_traefik_enabled else '30s' }}"

# Temporary folder used when exporting.
# Lablestudio collects all files in this folder before download,
# therefore in some cases (exporting labels with images) larger
# volume may be necessary.
labelstudio_container_tmpfs_size: "100m"

# A list of extra arguments to pass to the container
labelstudio_container_extra_arguments: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
labelstudio_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
labelstudio_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
labelstudio_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
labelstudio_http_header_permissions_policy: "{{ 'interest-cohort=()' if labelstudio_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
labelstudio_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if labelstudio_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `labelstudio_http_header_permissions_policy`
labelstudio_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `labelstudio_http_header_strict_transport_security`
labelstudio_hsts_preload_enabled: false

# List of systemd services that labelstudio.service depends on
labelstudio_systemd_required_services_list: "{{ labelstudio_systemd_required_systemd_services_list_default + labelstudio_systemd_required_systemd_services_list_auto + labelstudio_systemd_required_systemd_services_list_custom }}"
labelstudio_systemd_required_systemd_services_list_default: ['docker.service']
labelstudio_systemd_required_systemd_services_list_auto: []
labelstudio_systemd_required_systemd_services_list_custom: []

# Controls if Postgre SQL is used as database backend (recommended)
labelstudio_postgres_backend_enabled: false
# Controls the DJANGO_DB environment variable
labelstudio_environment_variables_django_db: default
# Controls the SSRF_PROTECTION_ENABLED django env var
labelstudio_environment_variables_ssrf_protection_enabled: true
# Controls the POSTGRE_NAME environment variable
labelstudio_database_name: "labelstudio"
# Controls the POSTGRE_USER environment variable
labelstudio_database_username: ""
# Controls the POSTGRE_PASSWORD environment variable
labelstudio_database_password: ""
# Controls the POSTGRE_PORT environment variable
labelstudio_database_port: 5432
# Controls the POSTGRE_HOST environment variable
labelstudio_database_hostname: ""

# Controls if Minio is used as storage backend
labelstudio_minio_backend_enabled: false
# Controls the MINIO_ROOT_USER environment variable
labelstudio_environment_variables_minio_root_user: minio_admin_do_not_use_in_production
# Controls the MINIO_ROOT_PASSWORD environment variable
labelstudio_environment_variables_minio_root_password: minio_admin_do_not_use_in_production

# To disable the signup page unless someone uses the invitation link, set this to true
labelstudio_environment_variables_disable_signup_without_link: false
# If labelstudio_environment_variables_disable_signup_without_link is set,
# you must set an original user with password
# Token can also be added, use labelstudio_environment_variables_additional_variables
# for further details see the original documentation at: https://labelstud.io/guide/signup
labelstudio_environment_variables_username: ""
labelstudio_environment_variables_password: ""

# Additional environment variables.
labelstudio_environment_variables_additional_variables: ""
