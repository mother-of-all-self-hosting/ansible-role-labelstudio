---

- name: Ensure Label Studio paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: 0750
    owner: "{{ labelstudio_uid }}"
    group: "{{ labelstudio_gid }}"
  with_items:
    - "{{ labelstudio_base_path }}"
    - "{{ labelstudio_data_path }}"

- name: Ensure Label Studio support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ labelstudio_base_path }}/{{ item }}"
    mode: 0640
    owner: "{{ labelstudio_uid }}"
    group: "{{ labelstudio_gid }}"
  with_items:
    - env
    - labels

- name: Ensure Label Studio container image is pulled
  community.docker.docker_image:
    name: "{{ labelstudio_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ labelstudio_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else labelstudio_container_image_force_pull }}"
  register: result
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: result is not failed

- name: Ensure Label Studio container network is created
  community.general.docker_network:
    name: "{{ labelstudio_container_network }}"
    driver: bridge

- name: Ensure Label Studio systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/labelstudio.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ labelstudio_identifier }}.service"
