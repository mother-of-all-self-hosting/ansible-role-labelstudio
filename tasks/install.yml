---
- name: Ensure Label Studio paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ labelstudio_uid }}"
    group: "{{ labelstudio_gid }}"
  with_items:
    - "{{ labelstudio_base_path }}"
    - "{{ labelstudio_data_path }}"

- name: Ensure Label Studio support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ labelstudio_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ labelstudio_uid }}"
    group: "{{ labelstudio_gid }}"
  with_items:
    - env
    - labels
  register: labelstudio_support_files_result

- name: Ensure Label Studio container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ labelstudio_container_image }}"
    pull: always
  register: labelstudio_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: labelstudio_container_image_pull_result_ansible_module is not failed

- name: Ensure Label Studio container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ labelstudio_container_image }}"
  register: labelstudio_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: labelstudio_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in labelstudio_container_image_pull_result_command.stdout"

- name: Ensure Label Studio container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ labelstudio_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: labelstudio_network_creation_result

- name: Ensure Label Studio container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ labelstudio_container_network }}
  register: labelstudio_network_creation_result
  changed_when: labelstudio_network_creation_result.rc == 0
  failed_when: labelstudio_network_creation_result.rc != 0 and 'already exists' not in labelstudio_network_creation_result.stderr

- name: Ensure Label Studio systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/labelstudio.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ labelstudio_identifier }}.service"
    mode: "0644"
  register: labelstudio_systemd_service_result

- name: Determine whether Label Studio needs a restart
  ansible.builtin.set_fact:
    labelstudio_restart_necessary: >-
      {{
        labelstudio_support_files_result.changed | default(false)
        or labelstudio_systemd_service_result.changed | default(false)
        or labelstudio_container_image_pull_result_ansible_module.changed | default(false)
        or labelstudio_container_image_pull_result_command.changed | default(false)
      }}
